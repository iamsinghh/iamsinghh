<svg width="1000" height="180" viewBox="0 0 1000 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium Dark Background Layer matching main banner theme -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050302"/>
      <stop offset="50%" stop-color="#0f0b06"/>
      <stop offset="100%" stop-color="#171109"/>
    </linearGradient>

    <!-- Luxury Ambient Character Backlight Glow -->
    <radialGradient id="charGlow" cx="0%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#e3b43b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050302" stop-opacity="0"/>
    </radialGradient>

    <!-- High-End 3D Shadows for Pop-out styling -->
    <filter id="popShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.7"/>
    </filter>

    <linearGradient id="tGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B5732B"/>
      <stop offset="100%" stop-color="#F0C077"/>
    </linearGradient>

    <!-- Character Asset Definitions (Cap, Skin, Jacket) -->
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#241e1a"/>
      <stop offset="100%" stop-color="#120e0c"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff4eb"/>
      <stop offset="100%" stop-color="#ffdcb8"/>
    </linearGradient>
    <linearGradient id="jacketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dfd2c0"/>
      <stop offset="100%" stop-color="#b8aa96"/>
    </linearGradient>
    <linearGradient id="innerTeeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1815"/>
      <stop offset="100%" stop-color="#0a0807"/>
    </linearGradient>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#201c24"/>
      <stop offset="100%" stop-color="#0f0d12"/>
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect width="1000" height="180" fill="url(#bgGrad)"/>

  <!-- Core Pipeline Track -->
  <line x1="80" y1="95" x2="920" y2="95" stroke="#3d2e1e" stroke-width="3" stroke-dasharray="1 1" opacity="0.6"/>
  <line x1="80" y1="95" x2="920" y2="95" stroke="url(#tGrad)" stroke-width="2" opacity="0.4"/>

  
  <!-- Timeline Nodes & Typography -->
  <g font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="700" letter-spacing="1.5">

    <!-- Node 1 -->
    <g>
      <circle cx="80" cy="95" r="0" fill="url(#tGrad)"><animate attributeName="r" to="7" dur="0.4s" begin="0.0s" fill="freeze"/></circle>
      <text x="95" y="62" fill="#B7A78C" text-anchor="middle" opacity="0" font-size="17">Business Graduate
        <animate attributeName="opacity" to="1" dur="0.4s" begin="0.0s" fill="freeze"/>
      </text>
    </g>

    <!-- Node 2 -->
    <g>
      <circle cx="290" cy="95" r="0" fill="url(#tGrad)"><animate attributeName="r" to="7" dur="0.4s" begin="0.5s" fill="freeze"/></circle>
      <text x="290" y="134" fill="#F0C077" text-anchor="middle" opacity="0">EXCEL
        <animate attributeName="opacity" to="1" dur="0.4s" begin="0.5s" fill="freeze"/>
      </text>
    </g>

    <!-- Node 3 -->
    <g>
      <circle cx="500" cy="95" r="0" fill="url(#tGrad)"><animate attributeName="r" to="7" dur="0.4s" begin="1.0s" fill="freeze"/></circle>
      <text x="500" y="62" fill="#F0C077" text-anchor="middle" opacity="0">SQL
        <animate attributeName="opacity" to="1" dur="0.4s" begin="1.0s" fill="freeze"/>
      </text>
    </g>

    <!-- Node 4 -->
    <g>
      <circle cx="710" cy="95" r="0" fill="url(#tGrad)"><animate attributeName="r" to="7" dur="0.4s" begin="1.5s" fill="freeze"/></circle>
      <text x="710" y="134" fill="#F0C077" text-anchor="middle" opacity="0">POWER BI
        <animate attributeName="opacity" to="1" dur="0.4s" begin="1.5s" fill="freeze"/>
      </text>
    </g>

    <!-- Node 5 -->
    <g>
      <circle cx="920" cy="95" r="0" fill="url(#tGrad)"><animate attributeName="r" to="7" dur="0.4s" begin="2.0s" fill="freeze"/></circle>
      <text x="920" y="62" fill="#F4E9D8" text-anchor="middle" opacity="0">PYTHON
        <animate attributeName="opacity" to="1" dur="0.4s" begin="2.0s" fill="freeze"/>
      </text>
    </g>
<!-- DYNAMIC RUNNING CHARACTER: Moves seamlessly from BBA (80) to Python (920) -->
  <g filter="url(#popShadow)" opacity="0">
    <!-- Fixed: Shifted Y from 48 to 58 so the character runs directly on top of the line path rather than hovering above it -->
    <animateMotion path="M 80,58 L 920,58" dur="6.8s" begin="2.6s" repeatCount="indefinite"/>
    <!-- Visibility synced with line traversal -->
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.03;0.97;1" dur="6.8s" begin="2.6s" repeatCount="indefinite"/>

    <!-- Scaled and Thinned Character Group (Slim and Fit) adjusted for Timeline Proportions -->
    <g transform="scale(0.35, 0.33) translate(-30, -50)">
      <!-- Smooth running tilt & head bob combination -->
      <g transform="rotate(5)">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="0.9s" repeatCount="indefinite"/>
        
        <!-- Back Hair -->
        <path d="M -50 -12 C -50 15 -35 25 0 25 C 35 25 50 15 50 -12 Z" fill="#0f0c0a"/>

        <!-- Thinned Torso Layering (Fit body) -->
        <path d="M -25 65 Q 0 75 25 65 L 30 165 L -30 165 Z" fill="url(#innerTeeGrad)"/>
        
        <!-- ACTIVE RUNNING ARMS LAYER -->
        <!-- Character's Right Arm -->
        <g stroke="#1c1613" stroke-width="3">
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0 64 85; -30 64 85; 0 64 85" dur="0.9s" repeatCount="indefinite"/>
            <path d="M 64 85 Q 85 110 95 130 L 55 105 Z" fill="url(#jacketGrad)"/>
            <!-- Hand / Fist -->
            <g transform="translate(90, 135)">
                <animateTransform attributeName="transform" type="translate" values="0,0; -3,-3; 0,0" dur="0.9s" repeatCount="indefinite" additive="sum"/>
                <circle cx="0" cy="0" r="9" fill="url(#skinGrad)"/>
            </g>
          </g>
        </g>
        
        <!-- Character's Left Arm -->
        <g stroke="#1c1613" stroke-width="3">
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0 -64 85; 30 -64 85; 0 -64 85" dur="0.9s" repeatCount="indefinite"/>
            <path d="M -64 85 Q -90 100 -105 125 L -55 105 Z" fill="url(#jacketGrad)"/>
            <!-- Hand / Fist -->
            <g transform="translate(-100, 130)">
                <animateTransform attributeName="transform" type="translate" values="0,0; 3,-3; 0,0" dur="0.9s" repeatCount="indefinite" additive="sum"/>
                <circle cx="0" cy="0" r="9" fill="url(#skinGrad)"/>
            </g>
          </g>
        </g>

        <!-- Thinned Jacket Panels -->
        <path d="M -60 90 C -60 90 -45 64 -25 62 L -18 88 L -35 165 L -65 165 Z" fill="url(#jacketGrad)"/>
        <path d="M 60 90 C 60 90 45 64 25 62 L 18 88 L 35 165 L 65 165 Z" fill="url(#jacketGrad)"/>
        <path d="M -25 62 L -12 90 L -25 96 Z" fill="#d2c4b0" stroke="#b8aa96" stroke-width="1"/>
        <path d="M 25 62 L 12 90 L 25 96 Z" fill="#d2c4b0" stroke="#b8aa96" stroke-width="1"/>

        <!-- Neck -->
        <path d="M -16 20 L -16 66 L 16 66 L 16 20 Z" fill="url(#skinGrad)"/>

        <!-- Sunglasses Ear Handles -->
        <path d="M -38 -12 L -54 -12 C -56 -12 -57 -8 -56 -4" stroke="#0f0d12" stroke-width="4" fill="none"/> 
        <path d="M 38 -12 L 54 -12 C 56 -12 57 -8 56 -4" stroke="#0f0d12" stroke-width="4" fill="none"/>

        <!-- Ears -->
        <circle cx="-51" cy="-6" r="10.5" fill="url(#skinGrad)" stroke="#1c1613" stroke-width="3"/>
        <circle cx="51" cy="-6" r="10.5" fill="url(#skinGrad)" stroke="#1c1613" stroke-width="3"/>

        <!-- Face Base -->
        <path d="M -46 -30 C -46 -30 -47 0 -38 18 L 0 38 L 38 18 C 47 0 46 -30 46 -30 Z" fill="url(#skinGrad)" stroke="#1c1613" stroke-width="4"/>

        <!-- Sharp Nose -->
        <path d="M -1 -4 L 1 3 L 3 1" stroke="#d1ab8c" stroke-width="2.5" fill="none"/>

        <!-- Mouth -->
        <path d="M -8 16 Q 0 14 8 16" stroke="#4a2a15" stroke-width="3" fill="none"/>

        <!-- Sunglasses Assembly -->
        <g>
          <path d="M -39 -14 Q -20 -20 -3 -14 Q -2 -2 0 1 Q -10 14 -23 14 Q -38 11 -39 -14 Z" fill="url(#lensGrad)" stroke="#0f0d12" stroke-width="3.5"/>
          <path d="M 3 -14 Q 20 -20 39 -14 Q 40 -2 39 1 Q 35 14 23 14 Q 8 11 3 -14 Z" fill="url(#lensGrad)" stroke="#0f0d12" stroke-width="3.5"/>
          <path d="M -4 -12 L 4 -12" stroke="#0f0d12" stroke-width="4.5"/>
          <path d="M -32 -6 Q -24 -9 -18 -5" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.25"/>
          <path d="M 12 -6 Q 20 -9 26 -5" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.25"/>
        </g>

        <!-- Cap Structure -->
        <g stroke="#1c1613" stroke-width="4">
          <path d="M -48 -46 C -46 -88 -25 -92 0 -92 C 25 -92 46 -88 48 -46 Z" fill="url(#capGrad)"/>
          <path d="M -54 -48 C -30 -54 30 -54 54 -48 C 58 -42 50 -40 40 -40 C 15 -42 -15 -42 -40 -40 C -50 -40 -58 -42 -54 -48 Z" fill="#17120e"/>
          <circle cx="0" cy="-92" r="4.5" fill="url(#tGrad)" stroke-width="1.5"/>
          <text x="0" y="-58" font-family="system-ui" font-weight="900" font-size="18" fill="url(#tGrad)" text-anchor="middle" stroke="none">AS</text>
        </g>
      </g>
    </g>
  </g>
        
  </g>
</svg>
